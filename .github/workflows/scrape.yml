name: Broward scrape

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Days to look back"
        required: false
        default: "7"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: broward-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml dbfread playwright

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          LOOKBACK_DAYS:  ${{ github.event.inputs.lookback_days || '7' }}
          BCPA_DBF_URL:   ${{ secrets.BCPA_DBF_URL }}
          BCPA_FORM_URL:  ${{ secrets.BCPA_FORM_URL }}
          BCPA_POSTBACK:  ${{ secrets.BCPA_POSTBACK }}
        run: python scraper/fetch.py

      - name: Summarize results
        if: always()
        run: |
          if [ -f dashboard/records.json ]; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, pathlib
          d = json.loads(pathlib.Path("dashboard/records.json").read_text())
          total = d.get("total", 0)
          with_addr = d.get("with_address", 0)
          recs = d.get("records", [])
          hot  = sum(1 for r in recs if r.get("score", 0) >= 70)
          warm = sum(1 for r in recs if 50 <= r.get("score", 0) < 70)
          print("### Broward scrape summary\n")
          print(f"- **Total leads:** {total}")
          print(f"- **With address:** {with_addr}")
          print(f"- **Hot (\u226570):** {hot}")
          print(f"- **Warm (50-69):** {warm}")
          print(f"- **Window:** {d.get('date_range', {})}")
          print(f"- **Fetched:** {d.get('fetched_at')}")
          PY
          fi

      - name: Commit records.json updates
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add dashboard/records.json data/records.json dashboard/leads_ghl.csv 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(scrape): refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: broward-leads-${{ github.run_id }}
          path: |
            dashboard/records.json
            data/records.json
            dashboard/leads_ghl.csv
          if-no-files-found: warn
          retention-days: 30

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
